services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: battery_user
      POSTGRES_PASSWORD: battery_pass
      POSTGRES_DB: battery_erp
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - battery-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U battery_user -d battery_erp"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://battery_user:battery_pass@postgres:5432/battery_erp
      JWT_SECRET: supersecretjwtkey
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - battery-network

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - battery-network

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api
    networks:
      - battery-network

volumes:
  postgres-data:

networks:
  battery-network:
    driver: bridge